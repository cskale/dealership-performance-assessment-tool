[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' *.supabase.co wss://*.supabase.co; img-src 'self' data: blob: *.supabase.co; font-src 'self' data:; frame-ancestors 'self' https://*.lovableproject.com https://*.lovable.app https://*.lovable.dev https://*.lovable.cloud;"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
